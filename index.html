<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Audiostatement</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="wrap">

    <p class="eyebrow">Statement</p>

    <h1 class="title">Titel des Werks</h1>

    <p class="text">
      Hier steht der Fließtext / die poetische Beschreibung zum Werk.
      Ersetze diesen Platzhalter durch deinen tatsächlichen Text.
      Der Absatz bricht sauber um und bleibt auf kleinen Screens lesbar.
    </p>

    <div class="player" id="player">

      <button class="play-btn" id="playBtn" aria-label="Audio abspielen">
        <svg class="icon icon-play" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="icon icon-pause" viewBox="0 0 24 24" aria-hidden="true" hidden>
          <path d="M6 5h4v14H6zM14 5h4v14h-4z"/>
        </svg>
      </button>

      <div class="progress-wrap">
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
          <span id="timeCurrent">0:00</span>
          <span id="timeDuration">0:00</span>
        </div>
      </div>

    </div>

    <p class="hint" id="hint">Tippen zum Abspielen</p>

  </main>

  <audio id="audio" preload="none">
    <source src="audio/statement.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const iconPlay = document.querySelector('.icon-play');
    const iconPause = document.querySelector('.icon-pause');
    const progressTrack = document.getElementById('progressTrack');
    const progressFill = document.getElementById('progressFill');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeDuration = document.getElementById('timeDuration');
    const hint = document.getElementById('hint');

    function formatTime(sec) {
      if (!isFinite(sec)) return '0:00';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    });

    audio.addEventListener('play', () => {
      iconPlay.hidden = true;
      iconPause.hidden = false;
      hint.textContent = 'Wird abgespielt …';
    });

    audio.addEventListener('pause', () => {
      iconPlay.hidden = false;
      iconPause.hidden = true;
      hint.textContent = audio.currentTime > 0 && audio.currentTime < audio.duration
        ? 'Pausiert'
        : 'Tippen zum Abspielen';
    });

    audio.addEventListener('ended', () => {
      iconPlay.hidden = false;
      iconPause.hidden = true;
      hint.textContent = 'Erneut abspielen';
      progressFill.style.width = '0%';
    });

    audio.addEventListener('loadedmetadata', () => {
      timeDuration.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      timeCurrent.textContent = formatTime(audio.currentTime);
      if (audio.duration) {
        progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      }
    });

    audio.addEventListener('waiting', () => {
      hint.textContent = 'Lädt …';
    });

    // Scrubbing per Klick/Tap auf die Progress-Leiste
    progressTrack.addEventListener('click', (e) => {
      if (!audio.duration) return;
      const rect = progressTrack.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      audio.currentTime = ratio * audio.duration;
    });
  </script>

</body>
</html>
